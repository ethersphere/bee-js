name: Publish upcoming snapshot to npm

# Every merge to `upcoming` publishes an ephemeral prerelease under the `upcoming` dist-tag,
# so previews are installable with `npm install @ethersphere/bee-js@upcoming`. Publishing is
# gated on the required CI workflows passing for this commit via native job dependencies:
# each CI workflow is invoked here as a reusable (`workflow_call`) job, and `publish` waits on
# all of them through `needs`. The version (next patch + `-upcoming.<run_number>`) is computed
# at build time and never committed.
on:
  push:
    branches:
      - upcoming

permissions:
  id-token: write
  contents: read
  actions: read

jobs:
  tests-stable:
    uses: ./.github/workflows/tests.yaml
    secrets: inherit

  tests-rc:
    uses: ./.github/workflows/tests-rc.yaml
    secrets: inherit

  check:
    uses: ./.github/workflows/check.yaml
    secrets: inherit

  entrypoint:
    uses: ./.github/workflows/entrypoint.yaml
    secrets: inherit

  publish:
    needs: [tests-stable, tests-rc, check, entrypoint]
    runs-on: ubuntu-latest
    environment: publish
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: 'https://registry.npmjs.org'

      - run: npm ci

      - name: Compute snapshot version
        run: |
          BASE=$(node -p "require('./package.json').version.replace(/-.*$/, '')")
          NEXT=$(node -p "require('semver').inc('$BASE', 'patch')")
          echo "SNAPSHOT_VERSION=${NEXT}-upcoming.${{ github.run_number }}" >> "$GITHUB_ENV"

      - name: Set snapshot version (not committed)
        run: npm version "$SNAPSHOT_VERSION" --no-git-tag-version

      - run: npm run build --if-present

      - run: npm publish --provenance --access public --tag upcoming
